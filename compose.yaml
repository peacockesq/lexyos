services:
  lexyos:
    build:
      context: .
    image: lexyos:local
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 5174
      LEXYOS_STORAGE_PROVIDER: ${LEXYOS_STORAGE_PROVIDER:-local}
      LEXYOS_DATA_PATH: /app/data/lexyos.json
      LEXYOS_GOG_ACCOUNT: ${LEXYOS_GOG_ACCOUNT:-team}
      LEXYOS_DRIVE_ROOT_FOLDER_ID: ${LEXYOS_DRIVE_ROOT_FOLDER_ID:-}
    ports:
      - "${LEXYOS_PUBLIC_PORT:-5174}:5174"
    volumes:
      - lexyos-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5174/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  lexyos-data:
